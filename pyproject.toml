[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "memory-core"
version = "0.2.0"
description = "Independent memory hook core and gateway runtime."
readme = "README.md"
requires-python = ">=3.9"
dependencies = []

[project.optional-dependencies]
dev = ["pytest>=8.0"]

[project.scripts]
memory-init = "workspace.tools.init_project_memory:main"
memory-migrate = "workspace.tools.migrate_project_memory:main"
memory-validate = "workspace.tools.validate_project_memory:main"

[tool.setuptools.packages.find]
include = ["workspace*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
