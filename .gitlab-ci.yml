include:
  - project: 'infra/ci-templates'
    file: 'scope-check.yml'
  - project: 'infra/ci-templates'
    file: 'github-sync.yml'

stages:
  - test
  - health_check
  - sync
  - release
  - wiki
  - notify

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.pip-cache"

cache:
  key: v2-default-protected
  paths:
    - .pip-cache/

test:
  stage: test
  before_script:
    # 清理旧缓存，避免已删除模块冲突
    - rm -rf .pip-cache/* 2>/dev/null || true
    - find . -name "*.pyc" -delete 2>/dev/null || true
    - find . -name "__pycache__" -type d -exec rm -rf {} + 2>/dev/null || true
    # --break-system-packages 绕过 PEP 668，用户级别安装
    - python3 -m pip install --user --break-system-packages "pytest>=8.0,<9.0" "pytest-cov>=5.0"
    - export PATH="$HOME/.local/bin:$PATH"
    - export PYTHONPATH="$CI_PROJECT_DIR:$PYTHONPATH"
  script:
    - pytest -q tests
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
      changes:
        - "*.py"
        - "memory_core/**/*"
        - "tests/**/*"
        - "scripts/**/*"
        - "pyproject.toml"
        - "conftest.py"
        - "MANIFEST.in"
    - if: $CI_PIPELINE_SOURCE == "push"
      when: never

health-check:
  stage: health_check
  before_script:
    # 清理旧缓存和 .pyc 文件，避免已删除模块冲突
    - rm -rf .pip-cache/* 2>/dev/null || true
    - find . -name "*.pyc" -delete 2>/dev/null || true
    - find . -name "__pycache__" -type d -exec rm -rf {} + 2>/dev/null || true
    - python3 -m venv /tmp/ci-health-venv
    - source /tmp/ci-health-venv/bin/activate
    - pip install --upgrade pip
    - pip install -e ".[dev]"
    - pip install ruff
  script:
    - source /tmp/ci-health-venv/bin/activate
    - bash scripts/ci_health_check.sh
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"

create-release:
  stage: release
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - VERSION="${CI_COMMIT_TAG#v}"
    - NOTES=$(sed -n "/## \[${VERSION}\]/,/## \[/p" CHANGELOG.md | head -n -1)
    - if [ -z "$NOTES" ]; then NOTES="See CHANGELOG.md for details."; fi
    - |
      PAYLOAD=$(python3 -c "import json,sys; notes=sys.stdin.read(); print(json.dumps({'tag_name':'$CI_COMMIT_TAG','name':'memory-core $CI_COMMIT_TAG','description':notes}))" <<< "$NOTES")
      curl --header "Content-Type: application/json" --header "PRIVATE-TOKEN: $GITLAB_TOKEN" --data "$PAYLOAD" "$CI_API_V4_URL/projects/$CI_PROJECT_ID/releases"
  variables:
    GITLAB_TOKEN: "$CI_JOB_TOKEN"

github-release:
  stage: release
  needs: [sync-tags-to-github]
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - VERSION="${CI_COMMIT_TAG#v}"
    - NOTES=$(sed -n "/## \[${VERSION}\]/,/## \[/p" CHANGELOG.md | head -n -1)
    - if [ -z "$NOTES" ]; then NOTES="See CHANGELOG.md for details."; fi
    - |
      PAYLOAD=$(python3 -c "import json,sys; notes=sys.stdin.read(); print(json.dumps({'tag_name':'$CI_COMMIT_TAG','target_commitish':'main','name':'memory-core $CI_COMMIT_TAG','body':notes,'draft':False,'prerelease':False}))" <<< "$NOTES")
      curl --header "Authorization: token $GITHUB_TOKEN" --header "Content-Type: application/json" --data "$PAYLOAD" "https://api.github.com/repos/hdot123/memory/releases"

droid-wiki-refresh:
  stage: wiki
  script:
    - |
      curl -s http://localhost:5555/hooks/wiki-refresh \
        -H "Content-Type: application/json" \
        -d '{"ref":"main","project":"memory-core"}'
  rules:
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "main"

test-failed:
  stage: notify
  script:
    - echo "Test failed, notifying Linear via Droid..."
    - |
      curl -s "${MAC_WEBHOOK_URL}/hooks/ci-failed" \
        -H "Content-Type: application/json" \
        -H "X-CI-Secret: CIFailed2026" \
        -d "{\"pipeline_id\":\"${CI_PIPELINE_ID}\",\"project\":\"${CI_PROJECT_PATH}\",\"branch\":\"${CI_COMMIT_REF_NAME}\",\"sha\":\"${CI_COMMIT_SHA}\"}"
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
      when: on_failure
