include:
  - project: 'infra/ci-templates'
    file: 'scope-check.yml'
  - project: 'infra/ci-templates'
    file: 'github-sync.yml'

stages:
  - test
  - health_check
  - sync
  - release
  - wiki

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.pip-cache"

cache:
  paths:
    - .pip-cache/

test:
  stage: test
  before_script:
    - python3 -m venv /tmp/ci-venv
    - source /tmp/ci-venv/bin/activate
    - pip install --upgrade pip
    - pip install -e ".[dev]"
    - pip install ruff
  script:
    - source /tmp/ci-venv/bin/activate
    - ruff check .
    - python scripts/check_boundary.py
    - python -m pytest -q tests
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"

health-check:
  stage: health_check
  before_script:
    - python3 -m venv /tmp/ci-health-venv
    - source /tmp/ci-health-venv/bin/activate
    - pip install --upgrade pip
    - pip install -e ".[dev]"
    - pip install ruff
  script:
    - source /tmp/ci-health-venv/bin/activate
    - bash scripts/ci_health_check.sh
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"

create-release:
  stage: release
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - VERSION="${CI_COMMIT_TAG#v}"
    - NOTES=$(sed -n "/## \[${VERSION}\]/,/## \[/p" CHANGELOG.md | head -n -1)
    - if [ -z "$NOTES" ]; then NOTES="See CHANGELOG.md for details."; fi
    - |
      PAYLOAD=$(python3 -c "import json,sys; notes=sys.stdin.read(); print(json.dumps({'tag_name':'$CI_COMMIT_TAG','name':'memory-core $CI_COMMIT_TAG','description':notes}))" <<< "$NOTES")
      curl --header "Content-Type: application/json" --header "PRIVATE-TOKEN: $GITLAB_TOKEN" --data "$PAYLOAD" "$CI_API_V4_URL/projects/$CI_PROJECT_ID/releases"
  variables:
    GITLAB_TOKEN: "$CI_JOB_TOKEN"

github-release:
  stage: release
  needs: [sync-tags-to-github]
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - VERSION="${CI_COMMIT_TAG#v}"
    - NOTES=$(sed -n "/## \[${VERSION}\]/,/## \[/p" CHANGELOG.md | head -n -1)
    - if [ -z "$NOTES" ]; then NOTES="See CHANGELOG.md for details."; fi
    - |
      PAYLOAD=$(python3 -c "import json,sys; notes=sys.stdin.read(); print(json.dumps({'tag_name':'$CI_COMMIT_TAG','target_commitish':'main','name':'memory-core $CI_COMMIT_TAG','body':notes,'draft':False,'prerelease':False}))" <<< "$NOTES")
      curl --header "Authorization: token $GITHUB_TOKEN" --header "Content-Type: application/json" --data "$PAYLOAD" "https://api.github.com/repos/hdot123/memory/releases"

droid-wiki-refresh:
  stage: wiki
  before_script:
    - curl -fsSL https://app.factory.ai/cli | sh
  script:
    - droid exec --auto high "/wiki"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  variables:
    FACTORY_API_KEY: $FACTORY_API_KEY
