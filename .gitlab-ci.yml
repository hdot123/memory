stages:
  - test
  - health_check
  - sync

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.pip-cache"

cache:
  paths:
    - .pip-cache/

test:
  stage: test
  before_script:
    - python3 -m venv /tmp/ci-venv
    - source /tmp/ci-venv/bin/activate
    - pip install --upgrade pip pytest ruff
  script:
    - source /tmp/ci-venv/bin/activate
    - ruff check .
    - python scripts/check_boundary.py
    - python -m pytest -q tests
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'

health-check:
  stage: health_check
  before_script:
    - python3 -m venv /tmp/ci-health-venv
    - source /tmp/ci-health-venv/bin/activate
    - pip install --upgrade pip pytest ruff
  script:
    - source /tmp/ci-health-venv/bin/activate
    - bash scripts/ci_health_check.sh
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'

# ⚠️ GitHub is a mirror — all development happens on GitLab.
# Only sync after ALL stages pass (test + health_check).
# Never push directly to GitHub from any machine; only GitLab CI can push.
sync-to-github:
  stage: sync
  needs: [test, health-check]
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push"'
  before_script:
    - git config --global user.name "gitlab-ci"
    - git config --global user.email "ci@node-15.tail5e888.ts.net"
  script:
    - git checkout -B main HEAD
    - git remote remove github 2>/dev/null || true
    - git remote add github "https://x-access-token:${GITHUB_TOKEN}@github.com/hdot123/memory.git"
    - git push github main --force
