title = "gitleaks config"

[[rules]]
id = "generic-api-key"
description = "Generic API Key"
regex = '''(?i)(?:api[_-]?key|apikey|token|secret|password)\s*[=:]\s*['"][A-Za-z0-9+/=_-]{16,}['"]'''
tags = ["key", "secret"]

[allowlist]
paths = [
  '''conftest\.py$''',
  '''tests/.*''',
]
regexes = [
  '''phc_o963uzVAku9jd45B4tgV598LUu2oJQHKFBy3RKJtgAVs''',
]
