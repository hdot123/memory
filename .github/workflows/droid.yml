name: Droid Tag

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened]
  pull_request_review:
    types: [submitted]
  pull_request:
    types: [opened, edited]

jobs:
  droid:
    if: |
      (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@droid') && contains('OWNER|MEMBER|COLLABORATOR', github.event.comment.author_association)) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@droid') && contains('OWNER|MEMBER|COLLABORATOR', github.event.comment.author_association)) ||
        (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@droid') && contains('OWNER|MEMBER|COLLABORATOR', github.event.review.author_association)) ||
        (github.event_name == 'issues' && (contains(github.event.issue.body, '@droid') || contains(github.event.issue.title, '@droid')) && contains('OWNER|MEMBER|COLLABORATOR', github.event.issue.author_association)) ||
        (github.event_name == 'pull_request' && (contains(github.event.pull_request.body, '@droid') || contains(github.event.pull_request.title, '@droid')) && contains('OWNER|MEMBER|COLLABORATOR', github.event.pull_request.author_association))
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1
      - name: Run Droid Exec
        uses: Factory-AI/droid-action@7c7bfea2aa3bb7ea87579402cc1d89dbcf6b13b3
        with:
          factory_api_key: ${{ secrets.FACTORY_API_KEY }}
          droid_args: "--model grok-4.5"
          review_model: "grok-4.5"
