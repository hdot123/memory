name: Droid AutoWiki Refresh

# Auto-regenerate the Factory App Wiki on every push to the default branch.
# Wiki content is stored ONLY in the Factory App (private to the org).
# GitHub Wiki tab is intentionally never initialized, so /wiki skips the
# github-wiki sync step gracefully (see /cli/features/wiki/generate.md).
# The FACTORY_API_KEY secret is already configured for droid-review.yml / droid.yml.
on:
  push:
    branches: [main]

jobs:
  wiki-refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Factory Droid
        run: curl -fsSL https://app.factory.ai/cli | sh

      - name: Generate Wiki
        run: droid exec --auto high "/wiki"
        env:
          FACTORY_API_KEY: ${{ secrets.FACTORY_API_KEY }}
