name: Droid AutoWiki Refresh

# Auto-regenerate the Factory App Wiki on every push to the default branch.
# Wiki content is stored ONLY in the Factory App (private to the org).
# Defense-in-depth: repo-level has_wiki=false (set via gh api) ensures the
# {repo}.wiki.git endpoint 404s, so even if /wiki's github-sync logic changes
# it cannot push content to a world-readable GitHub Wiki tab on this public repo.
on:
  push:
    branches: [main]

jobs:
  wiki-refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Factory Droid
        run: curl -fsSL https://app.factory.ai/cli | sh

      - name: Write BYOK settings file
        # Mirrors droid-review.yml: routes qwen3.7-plus through the Kong proxy
        # (ai.exa.edu.kg) using NVIDIA_KONG_PROXY_KEY. Default claude-opus-4-8
        # is not in the org plan and fails in ~2s; BYOK is the verified path.
        env:
          NVIDIA_KONG_PROXY_KEY: ${{ secrets.NVIDIA_KONG_PROXY_KEY }}
        run: |
          python3 -c "
          import json, os
          settings = {
              'customModels': [{
                  'model': 'qwen3.7-plus',
                  'displayName': 'Bailian Qwen 3.7 Plus',
                  'baseUrl': 'https://ai.exa.edu.kg/v1',
                  'apiKey': os.environ['NVIDIA_KONG_PROXY_KEY'],
                  'provider': 'generic-chat-completion-api',
                  'maxOutputTokens': 65536,
                  'noImageSupport': True
              }]
          }
          os.makedirs(os.path.expanduser('~/.factory'), exist_ok=True)
          path = os.path.expanduser('~/.factory/settings.json')
          with open(path, 'w') as f:
              json.dump(settings, f)
          print('Valid JSON written to', path)
          "

      - name: Generate Wiki
        run: droid exec --auto high --model qwen3.7-plus "/wiki"
        env:
          FACTORY_API_KEY: ${{ secrets.FACTORY_API_KEY }}
