name: qa

on:
  pull_request:
    branches: [main]
  schedule:
    # UTC 02:00 daily (nightly full QA)
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  cli-e2e:
    name: CLI End-to-End Smoke Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: 'pip'
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
      - name: Run CLI E2E tests
        run: |
          python scripts/qa/run_cli_e2e.py --json qa-cli-e2e-results.json
      - name: Upload CLI E2E results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-cli-e2e-results
          path: qa-cli-e2e-results.json

  coverage-audit:
    name: Coverage Audit (target 80%)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: 'pip'
      - name: Install package and test deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest pytest-cov pytest-rerunfailures
      - name: Run coverage gap analysis
        # Note: target 80% is aspirational; CI reports gap but does not fail
        # until coverage is progressively raised from 15% baseline.
        # Change --target to match current pyproject.toml cov-fail-under when ready to gate.
        run: |
          python scripts/qa/coverage_gap_finder.py --target 80 --json qa-coverage-results.json || true
      - name: Run pytest with coverage (gated at current threshold)
        run: |
          python -m pytest tests/ --cov=memory_core --cov-report=xml --cov-branch --cov-fail-under=15
      - name: Upload coverage XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-coverage-results
          path: |
            coverage.xml
            qa-coverage-results.json

  hook-lifecycle:
    name: Hook Lifecycle Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: 'pip'
      - name: Install package and test deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest pytest-cov
      - name: Hook gateway & lifecycle tests
        run: |
          python -m pytest tests/ -k "hook or gateway or lifecycle or session" -v --tb=short --no-header -q
      - name: PreToolUse guard tests
        run: |
          python -m pytest tests/ -k "pretooluse or guard" -v --tb=short --no-header -q
      - name: Telemetry tests
        run: |
          python -m pytest tests/ -k "telemetry or posthog or metrics" -v --tb=short --no-header -q
      - name: Integrity tests
        run: |
          python -m pytest tests/ -k "integrity or resign or manifest or signing" -v --tb=short --no-header -q

  business-policy:
    name: Business Policy & Guard Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: 'pip'
      - name: Install package and test deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest pytest-cov
      - name: Business policy tests
        run: |
          python -m pytest tests/ -k "business_policy or rule or marker" -v --tb=short --no-header -q
      - name: Guard classification tests
        run: |
          python -m pytest tests/ -k "guard_classify or guard_pattern or denylist" -v --tb=short --no-header -q
      - name: Scope resolver tests
        run: |
          python -m pytest tests/ -k "scope or resolver or routing" -v --tb=short --no-header -q

  schema-migration:
    name: Schema & Migration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: 'pip'
      - name: Install package and test deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest pytest-cov
      - name: Migration tests
        run: |
          python -m pytest tests/ -k "migrate or migration" -v --tb=short --no-header -q
      - name: Schema tests
        run: |
          python -m pytest tests/ -k "schema or adapter or index_schema or template" -v --tb=short --no-header -q
      - name: Version sync tests
        run: |
          python -m pytest tests/ -k "version_sync or upgrade or hook_upgrade" -v --tb=short --no-header -q

  boundary-security:
    name: Boundary & Security Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: 'pip'
      - name: Install package and test deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest pytest-cov
      - name: Boundary tests
        run: |
          python -m pytest tests/ -k "boundary or readonly or pollution or source_repo" -v --tb=short --no-header -q
      - name: Denylist & guard tests
        run: |
          python -m pytest tests/ -k "denylist or guard_patterns or evidence" -v --tb=short --no-header -q
      - name: Boundary check script
        run: |
          python scripts/check_boundary.py
      - name: Repo health check
        run: |
          bash scripts/repo_health_check.sh --ci

  full-regression:
    name: Full Regression (Nightly only)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: 'pip'
      - name: Install package and all deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Full test suite with coverage
        run: |
          python -m pytest tests/ --cov=memory_core --cov-report=term-missing --cov-branch --durations=20
      - name: Full integration test
        run: |
          python scripts/test_full_integration.py --verbose || code=$?
          if [ "${code:-0}" = "1" ]; then exit 1; fi
      - name: CLI E2E all layers
        run: |
          python scripts/qa/run_cli_e2e.py --json qa-full-e2e.json
      - name: Coverage gap analysis
        run: |
          python scripts/qa/coverage_gap_finder.py --target 80 --json qa-full-coverage.json || true
      - name: Dependency security scan
        run: |
          pip-audit --progress-spinner off
      - name: TODO/FIXME scan
        continue-on-error: true
        run: |
          grep -rn --include="*.py" -E "TODO|FIXME" memory_core/ scripts/ || true
      - name: Upload full QA artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-full-regression-results
          path: |
            qa-full-e2e.json
            qa-full-coverage.json

  qa-ok:
    name: qa-ok
    runs-on: ubuntu-latest
    needs: [cli-e2e, coverage-audit, hook-lifecycle, business-policy, schema-migration, boundary-security]
    if: always()
    steps:
      - name: Verify QA jobs
        run: |
          echo "cli-e2e: ${{ needs.cli-e2e.result }}"
          echo "coverage-audit: ${{ needs.coverage-audit.result }}"
          echo "hook-lifecycle: ${{ needs.hook-lifecycle.result }}"
          echo "business-policy: ${{ needs.business-policy.result }}"
          echo "schema-migration: ${{ needs.schema-migration.result }}"
          echo "boundary-security: ${{ needs.boundary-security.result }}"

          if [ "${{ needs.cli-e2e.result }}" != "success" ]; then
            echo "FAIL: cli-e2e did not succeed"; exit 1
          fi
          if [ "${{ needs.coverage-audit.result }}" != "success" ]; then
            echo "FAIL: coverage-audit did not succeed"; exit 1
          fi
          if [ "${{ needs.hook-lifecycle.result }}" != "success" ]; then
            echo "FAIL: hook-lifecycle did not succeed"; exit 1
          fi
          if [ "${{ needs.business-policy.result }}" != "success" ]; then
            echo "FAIL: business-policy did not succeed"; exit 1
          fi
          if [ "${{ needs.schema-migration.result }}" != "success" ]; then
            echo "FAIL: schema-migration did not succeed"; exit 1
          fi
          if [ "${{ needs.boundary-security.result }}" != "success" ]; then
            echo "FAIL: boundary-security did not succeed"; exit 1
          fi
          echo "All QA jobs succeeded."
