name: ci

on:
  push:
    branches: [main]
    paths:
      - 'memory_core/**'
      - 'tests/**'
      - 'scripts/**'
      - 'pyproject.toml'
      - 'ruff.toml'
      - '.github/workflows/ci.yml'
      - '.github/workflows/release-and-dispatch.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      - name: Install test deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov ruff
          pip install -e ".[dev]"
      - name: Lint with ruff
        run: ruff check .
      - name: Install ripgrep
        run: sudo apt-get install -y ripgrep
      - name: BOUNDARY pollution guard
        run: python scripts/check_boundary.py
      - name: Run tests
        run: python -m pytest -q tests
      - name: Health check (validate + pollution)
        run: bash scripts/ci_health_check.sh

  advisory-security:
    name: Advisory dependency security scan
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
      - name: Install package and pip-audit
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pip-audit
      - name: Dependency audit
        run: pip-audit --progress-spinner off
