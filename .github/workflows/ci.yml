name: ci

on:
  push:
    branches: [main]
    paths:
      - 'memory_core/**'
      - 'tests/**'
      - 'scripts/**'
      - 'pyproject.toml'
      - 'ruff.toml'
      - '.github/workflows/ci.yml'
      - '.github/workflows/release-and-dispatch.yml'
  # pull_request 不做 paths 过滤：required check 必须在所有 PR 上报告，
  # 否则未触碰 paths 的 PR（如纯文档变更）会因等不到 check 而永久无法合并
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      - name: Timestamp - build start
        run: |
          echo "Build started at $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
      - name: Install package and test deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest==8.4.2 pytest-cov==7.1.0 pytest-rerunfailures==16.4
      - name: Timestamp - after install
        run: |
          echo "Install completed at $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check .
      - name: BOUNDARY pollution guard
        run: python scripts/check_boundary.py
      - name: Run tests with coverage
        run: python -m pytest -q tests --cov=memory_core --cov-report=xml
      - name: Timestamp - after tests
        run: |
          echo "Tests completed at $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v7
        with:
          files: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      - name: Health check (validate + pollution)
        run: bash scripts/ci_health_check.sh
      - name: Full integration test
        # exit 0 = all pass, 2 = warnings/skips only (expected on CI runner
        # which has no local consumer projects), 1 = actual failure
        run: |
          python scripts/test_full_integration.py || code=$?
          if [ "${code:-0}" = "1" ]; then exit 1; fi
      - name: Repo delivery consistency check
        run: bash scripts/repo_health_check.sh --ci
      - name: Scan TODO/FIXME comments (advisory)
        continue-on-error: true
        run: |
          echo "=== TODO/FIXME scan in memory_core/ and scripts/ ==="
          grep -rn --include="*.py" -E "TODO|FIXME" memory_core/ scripts/ || true
          echo "=== TODO/FIXME scan complete ==="
      - name: Check dependency usage with deptry
        run: |
          pip install deptry
          deptry .
      - name: Generate API documentation with pdoc (advisory)
        continue-on-error: true
        run: |
          pip install pdoc
          pdoc -o docs/api memory_core
          test -n "$(find docs/api -type f \( -name '*.html' -o -name '*.md' \) -print -quit)" && echo "PDOC_OUTPUT_OK" || echo "FAIL"

  advisory-security:
    name: Advisory dependency security scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
      - name: Install package and pip-audit
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pip-audit
      - name: Dependency audit
        run: pip-audit --progress-spinner off

  advisory-telemetry-audit:
    name: Advisory telemetry coverage audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Telemetry coverage audit
        run: bash scripts/audit_telemetry_coverage.sh

  advisory-typing:
    name: Advisory typing (mypy --strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
      - name: Install package and mypy
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install mypy
      - name: Run mypy --strict (baseline 220 errors, advisory only)
        continue-on-error: true
        run: |
          echo "Typing hardening: baseline 220 errors (22 files), 18 files now pass mypy --strict"
          python -m mypy --strict memory_core/ 2>&1 | tee mypy-report.txt || true
          echo "---"
          echo "Report written to mypy-report.txt"
          echo "See docs/typing-tech-debt.md for per-module breakdown and roadmap"

  # 聚合门禁：branch protection 只需 required 这一个 check，
  # 改动 test 的 Python 矩阵时无需同步调整 protection 配置
  ci-ok:
    name: ci-ok
    runs-on: ubuntu-latest
    needs: [test, advisory-security, advisory-telemetry-audit]
    if: always()
    steps:
      - name: Verify all required jobs succeeded
        run: |
          echo "test: ${{ needs.test.result }}"
          echo "advisory-security: ${{ needs.advisory-security.result }}"
          echo "advisory-telemetry-audit: ${{ needs.advisory-telemetry-audit.result }}"
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "FAIL: test did not succeed"; exit 1
          fi
          if [ "${{ needs.advisory-security.result }}" != "success" ]; then
            echo "FAIL: dependency security scan did not succeed"; exit 1
          fi
          if [ "${{ needs.advisory-telemetry-audit.result }}" != "success" ]; then
            echo "FAIL: telemetry coverage audit did not succeed"; exit 1
          fi
          echo "All required jobs succeeded."

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check droid-review status
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bash scripts/check_droid_review.sh \
            "${{ github.event_name }}" \
            "${{ github.repository }}" \
            "${{ github.event.pull_request.head.sha }}" \
            "$GH_TOKEN"

  notify-ci-complete:
    name: Notify CI complete to n8n
    runs-on: ubuntu-latest
    needs: ci-ok
    if: always()
    steps:
      - name: Send CI status webhook
        env:
          WEBHOOK_URL: ${{ secrets.N8N_CI_WEBHOOK_URL }}
          N8N_CI_TOKEN: ${{ secrets.N8N_CI_TOKEN }}
        run: |
          curl -s -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "X-CI-Token: ${N8N_CI_TOKEN}" \
            -d '{
              "repo": "${{ github.repository }}",
              "pr_number": ${{ github.event.pull_request.number || 0 }},
              "branch": "${{ github.head_ref || github.ref_name }}",
              "sha": "${{ github.sha }}",
              "status": "${{ needs.ci-ok.result }}"
            }' || true
