# GitHub is the primary repository for this project.
# All development, code review (PRs), and CI happen on GitHub.
# GitLab remote is retained for historical backup only.

name: ci

on:
  push:
    branches: [main, fix/signing-test-ci-310]
    paths:
      - 'memory_core/**'
      - 'tests/**'
      - 'scripts/**'
      - 'pyproject.toml'
      - 'ruff.toml'
      - '.github/workflows/ci.yml'
      - '.github/workflows/release-and-dispatch.yml'
  # pull_request is intentionally disabled — all code review happens on GitHub.

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      - name: Install package and test deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest pytest-cov
      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check .
      - name: BOUNDARY pollution guard
        run: python scripts/check_boundary.py
      - name: Run tests with coverage
        run: python -m pytest -q tests --cov=memory_core --cov-report=xml
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      - name: Health check (validate + pollution)
        run: bash scripts/ci_health_check.sh

  advisory-security:
    name: Advisory dependency security scan
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
      - name: Install package and pip-audit
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pip-audit
      - name: Dependency audit
        run: pip-audit --progress-spinner off

  advisory-telemetry-audit:
    name: Advisory telemetry coverage audit
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Telemetry coverage audit
        run: bash scripts/audit_telemetry_coverage.sh
