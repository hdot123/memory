name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dispatch_targets:
        description: "Comma-separated list of owner/repo to dispatch to"
        required: false
        type: string
        default: ""
      dispatch_event_type:
        description: "Event type for repository dispatch"
        required: false
        type: string
        default: "memory_release_published"

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      - run: python -m pip install --upgrade pip pytest
      - run: pip install ruff && ruff check .
      - run: python -m pytest -q tests

  release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Extract version from tag
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "Error: release must be triggered by a version tag" >&2
            exit 1
          fi

      - name: Verify tag matches pyproject.toml version
        run: |
          TAG_VER="${{ steps.version.outputs.tag }}"
          PY_VER="v$(python -c 'import tomllib; print(tomllib.open("pyproject.toml","rb")["project"]["version"])')"
          if [ "$TAG_VER" != "$PY_VER" ]; then
            echo "Tag $TAG_VER does not match pyproject.toml version $PY_VER"
            exit 1
          fi

      - run: python -m pip install --upgrade build twine

      - run: python -m build

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: dist/*
          generate_release_notes: true
          make_latest: true

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*

      - name: Dispatch downstream repositories
        if: ${{ inputs.dispatch_targets != '' && secrets.DISPATCH_TOKEN != '' }}
        env:
          GH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
          SOURCE_SHA: ${{ github.sha }}
          DISPATCH_TARGETS: ${{ inputs.dispatch_targets }}
          DISPATCH_EVENT_TYPE: ${{ inputs.dispatch_event_type }}
        run: |
          IFS=',' read -ra TARGETS <<< "$DISPATCH_TARGETS"
          for target in "${TARGETS[@]}"; do
            target=$(echo "$target" | xargs)
            [ -z "$target" ] && continue
            gh api "repos/${target}/dispatches" \
              --method POST \
              -f event_type="${DISPATCH_EVENT_TYPE}" \
              -f client_payload="{\"release_tag\":\"${RELEASE_TAG}\",\"source_sha\":\"${SOURCE_SHA}\"}"
          done

      - name: Warn when dispatch targets are configured but token is missing
        if: ${{ inputs.dispatch_targets != '' && secrets.DISPATCH_TOKEN == '' }}
        run: |
          echo "::warning::DISPATCH_TOKEN is empty, skipped dispatch to configured targets: ${{ inputs.dispatch_targets }}"
