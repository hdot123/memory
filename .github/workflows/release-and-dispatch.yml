name: release-and-dispatch

on:
  push:
    branches: [main]
    paths:
      - "workspace/**"
      - "tests/**"
      - ".github/workflows/**"
      - "README.md"
  workflow_dispatch:
    inputs:
      dispatch_targets:
        description: "Comma-separated list of owner/repo to dispatch to (e.g. org/repo1, org/repo2). Leave empty to skip all dispatch."
        required: false
        type: string
        default: ""
      dispatch_event_type:
        description: "Event type for repository dispatch"
        required: false
        type: string
        default: "memory_release_published"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test deps
        run: python -m pip install --upgrade pip pytest

      - name: Run tests
        run: python -m pytest -q tests

      - name: Compute next release tag
        id: version
        run: |
          last=$(git tag --list 'v*' --sort=-v:refname | head -n 1)
          if [ -z "$last" ]; then
            next="v0.0.0"
          else
            ver="${last#v}"
            minor="${ver%.*}"
            patch="${ver##*.}"
            next="v${minor}.$((patch + 1))"
          fi
          echo "tag=$next" >> "$GITHUB_OUTPUT"

      - name: Create and push release tag
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "tag already exists: $TAG"
          else
            git tag -a "$TAG" -m "Automated release $TAG"
            git push origin "$TAG"
          fi

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          make_latest: true

      - name: Dispatch downstream repositories
        if: ${{ inputs.dispatch_targets != '' && secrets.DISPATCH_TOKEN != '' }}
        env:
          GH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
          SOURCE_SHA: ${{ github.sha }}
          DISPATCH_TARGETS: ${{ inputs.dispatch_targets }}
          DISPATCH_EVENT_TYPE: ${{ inputs.dispatch_event_type }}
        run: |
          IFS=',' read -ra TARGETS <<< "$DISPATCH_TARGETS"
          for target in "${TARGETS[@]}"; do
            target=$(echo "$target" | xargs)
            [ -z "$target" ] && continue
            gh api "repos/${target}/dispatches" \
              --method POST \
              -f event_type="${DISPATCH_EVENT_TYPE}" \
              -f client_payload="{\"release_tag\":\"${RELEASE_TAG}\",\"source_sha\":\"${SOURCE_SHA}\"}"
          done

      - name: Warn when dispatch targets are configured but token is missing
        if: ${{ inputs.dispatch_targets != '' && secrets.DISPATCH_TOKEN == '' }}
        run: |
          echo "::warning::DISPATCH_TOKEN is empty, skipped dispatch to configured targets: ${{ inputs.dispatch_targets }}"
