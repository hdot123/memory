name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag (e.g., v1.2.3). Required for manual trigger. Must match pyproject.toml version."
        required: true
        type: string
      dispatch_targets:
        description: "Comma-separated list of owner/repo to dispatch to"
        required: false
        type: string
        default: ""
      dispatch_event_type:
        description: "Event type for repository dispatch"
        required: false
        type: string
        default: "memory_release_published"

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  test:
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      - name: Install package and test deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest pytest-cov
      - run: pip install ruff && ruff check .
      - run: python -m pytest -q tests

  release:
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Extract version from tag
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            # Manual trigger: use input release_tag
            INPUT_TAG="${{ inputs.release_tag }}"
            if [[ -z "$INPUT_TAG" ]]; then
              echo "Error: release_tag input is required for manual workflow dispatch" >&2
              exit 1
            fi
            if [[ ! "$INPUT_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+.*$ ]]; then
              echo "Error: release_tag must be a valid semver tag (e.g., v1.2.3), got: $INPUT_TAG" >&2
              exit 1
            fi
            echo "tag=$INPUT_TAG" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            # Tag push trigger: use ref
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "Error: release must be triggered by a version tag or workflow_dispatch with release_tag" >&2
            exit 1
          fi

      - name: Verify tag matches pyproject.toml version
        run: |
          TAG_VER="${{ steps.version.outputs.tag }}"
          PY_VER="v$(python -c 'import tomllib; f=open("pyproject.toml","rb"); print(tomllib.load(f)["project"]["version"])')"
          if [ "$TAG_VER" != "$PY_VER" ]; then
            echo "Tag $TAG_VER does not match pyproject.toml version $PY_VER"
            exit 1
          fi

      - run: python -m pip install --upgrade build

      - run: python -m build

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: dist/*
          generate_release_notes: true
          make_latest: true

      - name: Dispatch downstream repositories
        if: ${{ inputs.dispatch_targets != '' }}
        env:
          GH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
          SOURCE_SHA: ${{ github.sha }}
          DISPATCH_TARGETS: ${{ inputs.dispatch_targets }}
          DISPATCH_EVENT_TYPE: ${{ inputs.dispatch_event_type }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::warning::DISPATCH_TOKEN is empty, skipped dispatch"
            exit 0
          fi
          IFS=',' read -ra TARGETS <<< "$DISPATCH_TARGETS"
          for target in "${TARGETS[@]}"; do
            target=$(echo "$target" | xargs)
            [ -z "$target" ] && continue
            gh api "repos/${target}/dispatches" \
              --method POST \
              -f event_type="${DISPATCH_EVENT_TYPE}" \
              -f client_payload="{\"release_tag\":\"${RELEASE_TAG}\",\"source_sha\":\"${SOURCE_SHA}\"}"
          done
