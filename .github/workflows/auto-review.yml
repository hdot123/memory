name: Automated Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  pull-requests: write
  contents: read

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install tools
        run: pip install ruff pylint

      - name: Get changed files
        id: changed
        run: |
          git diff --name-only origin/main...HEAD > changed_files.txt
          echo "files=$(cat changed_files.txt | tr '\n' ' ')" >> $GITHUB_OUTPUT
          echo "count=$(wc -l < changed_files.txt)" >> $GITHUB_OUTPUT

      - name: Lint changed Python files
        id: lint
        run: |
          echo "## Lint Results" > review_comment.md
          python_files=$(grep '\.py$' changed_files.txt || true)
          if [ -n "$python_files" ]; then
            echo "Running ruff on changed files..." >&2
            ruff_result=$(ruff check $python_files 2>&1 || true)
            if [ -n "$ruff_result" ]; then
              echo '```' >> review_comment.md
              echo "$ruff_result" >> review_comment.md
              echo '```' >> review_comment.md
            else
              echo "- Ruff: No issues found" >> review_comment.md
            fi
          else
            echo "- No Python files changed" >> review_comment.md
          fi

      - name: Check file sizes
        run: |
          large_files=""
          while IFS= read -r f; do
            if [ -f "$f" ]; then
              size=$(wc -c < "$f")
              if [ "$size" -gt 51200 ]; then
                large_files="$large_files\n- **Large file**: $f ($(( size / 1024 ))KB)"
              fi
            fi
          done < changed_files.txt
          if [ -n "$large_files" ]; then
            echo "" >> review_comment.md
            echo "## File Size Warnings" >> review_comment.md
            echo -e "$large_files" >> review_comment.md
          fi

      - name: Check for sensitive patterns
        run: |
          sensitive=""
          while IFS= read -r f; do
            if [ -f "$f" ] && echo "$f" | grep -q '\.py$\|\.toml$\|\.yml$\|\.yaml$\|\.md$'; then
              matches=$(grep -nE '(password|secret|api_key|token)\s*=\s*["\x27][^"\x27]{8,}' "$f" 2>/dev/null || true)
              if [ -n "$matches" ]; then
                sensitive="$sensitive\n- **Potential secret** in $f:\n\`\`\`\n$matches\n\`\`\`"
              fi
            fi
          done < changed_files.txt
          if [ -n "$sensitive" ]; then
            echo "" >> review_comment.md
            echo "## Security Warnings" >> review_comment.md
            echo -e "$sensitive" >> review_comment.md
          fi

      - name: Post review comment
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('review_comment.md', 'utf8').trim();
            if (body.length > 10) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }
