# Droid Auto Review Workflow
# Uses Bailian (Qwen 3.7 Plus) via Kong Proxy BYOK configuration
# Kong Proxy at ai.exa.edu.kg routes qwen3.7-plus to node1 via Tailscale
# BYOK passed via droid-action `settings` input (official method)

name: Droid Auto Review

on:
  pull_request:
    types: [opened, ready_for_review, reopened, synchronize]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  droid-review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1
      - name: Write BYOK settings file
        env:
          BAILIAN_KONG_PROXY_KEY: ${{ secrets.BAILIAN_KONG_PROXY_KEY }}
        run: |
          python3 -c "
          import json, os
          settings = {
              'customModels': [{
                  'model': 'qwen3.7-plus',
                  'displayName': 'Bailian Qwen 3.7 Plus',
                  'baseUrl': 'https://ai.exa.edu.kg/v1',
                  'apiKey': os.environ['BAILIAN_KONG_PROXY_KEY'],
                  'provider': 'generic-chat-completion-api',
                  'maxOutputTokens': 65536,
                  'noImageSupport': True
              }]
          }
          os.makedirs(os.path.expanduser('~/.factory'), exist_ok=True)
          path = os.path.expanduser('~/.factory/settings.json')
          with open(path, 'w') as f:
              json.dump(settings, f)
          print('Valid JSON written to', path)
          "
      - name: Run Droid Auto Review
        uses: Factory-AI/droid-action@7c7bfea2aa3bb7ea87579402cc1d89dbcf6b13b3
        with:
          factory_api_key: ${{ secrets.FACTORY_API_KEY }}
          automatic_review: true
          automatic_security_review: true
          review_model: "qwen3.7-plus"
          allowed_bots: "dependabot[bot]"
