name: Droid Auto Review

on:
  pull_request:
    types: [opened, ready_for_review, reopened, synchronize]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  droid-review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1
      - name: Configure BYOK for NVIDIA NIM
        env:
          NVIDIA_NIM_API_KEY: ${{ secrets.NVIDIA_NIM_API_KEY }}
        run: |
          mkdir -p ~/.factory
          cat > ~/.factory/settings.json << SETTINGS_EOF
          {
            "customModels": [
              {
                "model": "nvidia/nemotron-3-super-120b-a12b",
                "displayName": "NVIDIA NIM Nemotron",
                "baseUrl": "https://integrate.api.nvidia.com/v1",
                "apiKey": "${NVIDIA_NIM_API_KEY}",
                "provider": "generic-chat-completion-api",
                "maxOutputTokens": 16384,
                "noImageSupport": true
              }
            ]
          }
          SETTINGS_EOF
          echo "BYOK settings.json written successfully"
      - name: Run Droid Auto Review
        uses: Factory-AI/droid-action@7c7bfea2aa3bb7ea87579402cc1d89dbcf6b13b3
        with:
          factory_api_key: ${{ secrets.FACTORY_API_KEY }}
          automatic_review: true
          automatic_security_review: true
          review_model: "nvidia/nemotron-3-super-120b-a12b"
