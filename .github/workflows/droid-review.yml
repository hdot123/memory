# Droid Auto Review Workflow
# Uses Bailian (Qwen 3.7 Plus) via Kong Proxy BYOK configuration
# Kong Proxy at ai.exa.edu.kg routes qwen3.7-plus to node1 via Tailscale
# Review typically takes 3-5 minutes. Timeout set to 30 minutes in check_droid_review.sh

name: Droid Auto Review

on:
  pull_request:
    types: [opened, ready_for_review, reopened, synchronize]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  droid-review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1
      - name: Configure BYOK for Bailian via Kong Proxy
        env:
          BAILIAN_KONG_PROXY_KEY: ${{ secrets.BAILIAN_KONG_PROXY_KEY }}
        run: |
          mkdir -p ~/.factory
          cat > ~/.factory/settings.json << SETTINGS_EOF
          {
            "customModels": [
              {
                "model": "qwen3.7-plus",
                "displayName": "Bailian Qwen 3.7 Plus",
                "baseUrl": "https://ai.exa.edu.kg/v1",
                "apiKey": "${BAILIAN_KONG_PROXY_KEY}",
                "provider": "generic-chat-completion-api",
                "maxOutputTokens": 65536,
                "noImageSupport": true
              }
            ]
          }
          SETTINGS_EOF
          echo "BYOK settings.json written successfully"
      - name: Run Droid Auto Review
        uses: Factory-AI/droid-action@7c7bfea2aa3bb7ea87579402cc1d89dbcf6b13b3
        with:
          factory_api_key: ${{ secrets.FACTORY_API_KEY }}
          automatic_review: true
          automatic_security_review: true
          review_model: "qwen3.7-plus"
          allowed_bots: "dependabot[bot]"
