version: 2
updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - P2
    # Dependabot does not support minimum-release-age natively.
    # The weekly schedule controls update cadence.
    # Manual review of PRs is required before merging.
    target-branch: main

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels:
      - dependencies
      - P2
