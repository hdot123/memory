version: 2
updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - P2
    # Wait 7 days before proposing new dependency versions
    # to reduce supply-chain risk from compromised releases
    target-branch: main

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels:
      - dependencies
      - P2
